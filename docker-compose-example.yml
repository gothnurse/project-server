services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: always
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"
    environment:
      TZ: "Europe/Berlin"
      WEBPASSWORD: ${PIHOLE_PASSWORD}
      PIHOLE_DNS_1: "1.1.1.1"
      PIHOLE_DNS_2: "8.8.8.8"
      DNSMASQ_LISTENING: "all"
      FTLCONF_LOCAL_IPV4: "YOUR_SERVER_IP"
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq:/etc/dnsmasq.d
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - server-network

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: always
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    environment:
      WG_HOST: "YOUR_SERVER_IP"
      PASSWORD_HASH: ${WG_PASSWORD_HASH}
      TZ: "Europe/Berlin"
      WG_DEFAULT_DNS: "YOUR_SERVER_IP"
    volumes:
      - ./wireguard:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - server-network

  minecraft:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    restart: always
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "1500M"
    volumes:
      - ./minecraft:/data
    networks:
      - server-network

  discord-bot:
    build: ./discord-bot
    container_name: discord-bot
    restart: always
    networks:
      - server-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - server-network

networks:
  server-network:
    driver: bridge

volumes:
  portainer_data:
